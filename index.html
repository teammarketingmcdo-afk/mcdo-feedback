<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre avis compte</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<img src="logo.png" class="logo" onclick="history.back()">
</header>

<div class="container">

<div class="card">

<h1>Sélectionnez votre restaurant</h1>

<p class="subtitle">
Choisissez le restaurant concerné par votre visite
</p>

<div class="restaurants">

<button class="restaurant-btn" onclick="chooseRestaurant('MERIADECK')">
<span class="restaurant-main">Mériadeck</span>
</button>

<button class="restaurant-btn" onclick="chooseRestaurant('S9')">
<span class="restaurant-main">Sortie 9</span>
<span class="restaurant-sub">rue Magudas</span>
</button>

<button class="restaurant-btn" onclick="chooseRestaurant('S10')">
<span class="restaurant-main">Sortie 10</span>
<span class="restaurant-sub">rue des Châtaigniers</span>
</button>

<button class="restaurant-btn" onclick="chooseRestaurant('S11')">
<span class="restaurant-main">Sortie 11</span>
<span class="restaurant-sub">rue Hipparque</span>
</button>

<!--
AJOUT D’UN NOUVEAU RESTAURANT

Pour ajouter un restaurant :
1. Copier le bloc ci-dessous
2. Enlever les lignes de commentaire qui entourent le bouton
3. Remplacer S12 par le code souhaité
4. Modifier le nom et la rue
-->

<!--
<button class="restaurant-btn" onclick="chooseRestaurant('S12')">
<span class="restaurant-main">Sortie 12</span>
<span class="restaurant-sub">Nom de la rue</span>
</button>
-->

</div>

</div>

</div>

<script>

function chooseRestaurant(code){

localStorage.clear();
localStorage.setItem("restaurant", code);
window.location.href = "rating.html";

}

</script>

</body>
</html>
