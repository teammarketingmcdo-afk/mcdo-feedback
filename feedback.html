<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre avis</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<img src="logo.png" class="logo" onclick="history.back()">
</header>

<div class="container">
<div class="card">

<h1>Partagez votre expérience</h1>

<p class="subtitle">
Quelques informations supplémentaires nous aideront à mieux comprendre votre visite
</p>

<form id="feedbackForm" action="https://formsubmit.co/experienceclient@mcdofamily.com" method="POST">

<input type="hidden" name="_subject" value="Nouveau retour client McDonald's">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://teammarketingmcdo-afk.github.io/mcdo-feedback/index.html">

<input type="hidden" id="restaurantInput" name="Restaurant">
<input type="hidden" id="ratingInput" name="Note">

<label>Comment évaluez-vous la qualité de votre repas ?</label>
<select name="Qualité du repas" id="qualite">
<option>Très bien</option>
<option>Bien</option>
<option>Moyen</option>
<option>Mauvais</option>
</select>

<label>Votre commande était-elle correcte ?</label>
<select name="Commande correcte" id="commande">
<option>Oui</option>
<option>Non</option>
</select>

<label>Comment jugez-vous le temps d’attente ?</label>
<select name="Temps d'attente" id="attente">
<option>Rapide</option>
<option>Correct</option>
<option>Trop long</option>
</select>

<label>Comment évaluez-vous l’accueil du personnel ?</label>
<select name="Accueil" id="accueil">
<option>Excellent</option>
<option>Correct</option>
<option>Mauvais</option>
</select>

<label>Comment trouvez-vous la propreté du restaurant ?</label>
<select name="Propreté" id="proprete">
<option>Très propre</option>
<option>Correct</option>
<option>Sale</option>
</select>

<label>Votre avis</label>
<textarea name="Commentaire" id="commentaire" placeholder="Votre message..."></textarea>

<label>Souhaitez-vous être recontacté ?</label>
<select name="Souhaite être recontacté" id="contactChoice">
<option>Non</option>
<option>Oui</option>
</select>

<div id="contactFields" style="display:none;">

<label>Email</label>
<input
type="email"
name="Email client"
id="emailClient"
placeholder="votre@email.com">

<label>Téléphone</label>
<input
type="tel"
name="Téléphone client"
id="telephoneClient"
placeholder="06 00 00 00 00">

</div>

<button type="submit" class="primary-btn">
Envoyer
</button>

</form>

</div>
</div>

<script src="js/feedback.js"></script>

</body>
</html>
